<svg xmlns="http://www.w3.org/2000/svg" width="380" height="130" viewBox="0 0 380 130">
  <defs>
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f0f0f" flood-opacity="0.08" />
    </filter>
  </defs>
  <g filter="url(#card-shadow)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0s" dur="0.4s" fill="freeze" />
    <animateTransform attributeName="transform" type="translate" from="0 6" to="0 0" begin="0s" dur="0.5s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1" keyTimes="0;1" />
    <rect x="0.5" y="0.5" width="379" height="117" rx="12" fill="#ffffff" stroke="#e1e0d9" />
    
        <g opacity="0">
          <animate attributeName="opacity" from="0" to="1" begin="0.15s" dur="0.35s" fill="freeze" />
          <text x="20" y="37" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#0f0f0f" opacity="0.7">Repos</text>
          <text x="200" y="37" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#0f0f0f" text-anchor="end" font-weight="600">2</text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" from="0" to="1" begin="0.25s" dur="0.35s" fill="freeze" />
          <text x="20" y="63" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#0f0f0f" opacity="0.7">Contributions</text>
          <text x="200" y="63" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#0f0f0f" text-anchor="end" font-weight="600">43</text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" from="0" to="1" begin="0.35s" dur="0.35s" fill="freeze" />
          <text x="20" y="89" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#0f0f0f" opacity="0.7">Language</text>
          <text x="200" y="89" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#0f0f0f" text-anchor="end" font-weight="600">Python</text>
        </g>
    <line x1="224" y1="20" x2="224" y2="98" stroke="#e1e0d9" />
    
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.1s" dur="0.4s" fill="freeze" />
      <circle cx="326" cy="59" r="30" fill="none" stroke="#e1e0d9" stroke-width="4" />
      <circle cx="326" cy="59" r="30" fill="none" stroke="#0f0f0f" stroke-width="4"
        stroke-linecap="round" stroke-dasharray="188.49555921538757" stroke-dashoffset="188.49555921538757"
        transform="rotate(-90 326 59)">
        <animate attributeName="stroke-dashoffset" from="188.49555921538757" to="185.19767455554967" begin="0.3s" dur="0.9s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1" keyTimes="0;1" />
      </circle>
      <text x="326" y="66" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="21" font-weight="700" fill="#0f0f0f" text-anchor="middle">C</text>
    </g>
  </g>
</svg>