<svg xmlns="http://www.w3.org/2000/svg" width="460" height="246" viewBox="0 0 460 246">
  <defs>
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.45" />
    </filter>
  </defs>
  <g filter="url(#card-shadow)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0s" dur="0.4s" fill="freeze" />
    <animateTransform attributeName="transform" type="translate" from="0 6" to="0 0" begin="0s" dur="0.5s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1" keyTimes="0;1" />
    <rect x="0.5" y="0.5" width="459" height="233" rx="12" fill="#0f0f0f" stroke="#2c2c2a" />
    
      <g opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="0.15s" dur="0.4s" fill="freeze" />
        <text x="24" y="36" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" fill="#ffffff">Routing over orchestration</text>
        <text x="24" y="56" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5" fill="#ffffff" opacity="0.65"><tspan x="24" dy="0">Send work to the right primitive instead of centrally</tspan><tspan x="24" dy="18">managing it.</tspan></text>
      </g><line x1="24" y1="88" x2="436" y2="88" stroke="#2c2c2a" />
      <g opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="0.27s" dur="0.4s" fill="freeze" />
        <text x="24" y="112" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" fill="#ffffff">Observable failure</text>
        <text x="24" y="132" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5" fill="#ffffff" opacity="0.65"><tspan x="24" dy="0">A failure should be visible and diagnosable, never</tspan><tspan x="24" dy="18">silent.</tspan></text>
      </g><line x1="24" y1="164" x2="436" y2="164" stroke="#2c2c2a" />
      <g opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="0.39s" dur="0.4s" fill="freeze" />
        <text x="24" y="188" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700" fill="#ffffff">Honest scope</text>
        <text x="24" y="208" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5" fill="#ffffff" opacity="0.65"><tspan x="24" dy="0">A tool does exactly what it claims — nothing more.</tspan></text>
      </g>
  </g>
</svg>